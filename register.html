<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register - UMKMify</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <div class="page-wrapper">
    <div class="card">

      <div class="card-header">
        <div class="logo-area">
          <img src="images/UMKMify_Logo_Color.png" alt="UMKMify" class="logo-img"/>
        </div>
        <p class="site-tagline">Platform Digital untuk UMKM Indonesia</p>
      </div>

      <div class="card-body">
        <h2 class="form-title">Buat Akun Baru</h2>
        <p class="form-subtitle">Daftarkan diri Anda untuk mulai menggunakan layanan</p>

        <div class="form-group">
          <label for="nama">Nama Lengkap</label>
          <input type="text" id="nama" placeholder="Masukkan nama lengkap"/>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="contoh@email.com"/>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Buat password"/>
        </div>

        <div class="form-group">
          <label for="konfirmasi">Konfirmasi Password</label>
          <input type="password" id="konfirmasi" placeholder="Ulangi password"/>
        </div>

        <div class="terms-row">
          <label class="remember-label">
            <input type="checkbox"/>
            Saya setuju dengan <a href="#" class="forgot-link">Syarat &amp; Ketentuan</a>
          </label>
        </div>

        <button class="btn-primary">DAFTAR SEKARANG</button>

        <div class="divider"><span>atau</span></div>

        <p class="switch-link">
          Sudah punya akun? <a href="login.html">Masuk di sini</a>
        </p>
      </div>

    </div>
    <p class="footer-text">© 2025 UMKMify. All rights reserved.</p>
  </div>

</body>
</html>
