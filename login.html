<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - UMKMify</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
  <div class="page-wrapper">
    <div class="card">
      <div class="card-header">
        <div class="logo-area">
          <span class="logo-text">UMKM<span>ify</span></span>
        </div>
        <p class="site-tagline">Platform Digital UMKM dan Produk Lokal Lampung</p>
      </div>
      <div class="card-body">
        <h2 class="form-title">Selamat Datang</h2>
        <p class="form-subtitle">Masuk ke akun Anda untuk melanjutkan</p>
        <div class="role-select-area">
          <label>Masuk sebagai</label>
          <div class="role-options">
            <div class="role-option" id="role-pengunjung" onclick="pilihRole('pengunjung')">
              <span class="role-icon">🛍️</span>
              <span class="role-label">Pengunjung</span>
            </div>
            <div class="role-option" id="role-pemilik" onclick="pilihRole('pemilik')">
              <span class="role-icon">🏪</span>
              <span class="role-label">Pemilik UMKM</span>
            </div>
            <div class="role-option" id="role-admin" onclick="pilihRole('admin')">
              <span class="role-icon">⚙️</span>
              <span class="role-label">Admin</span>
            </div>
          </div>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Masukkan email">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Masukkan password">
        </div>
        <div class="remember-row">
          <label class="remember-label">
            <input type="checkbox"> Ingat saya
          </label>
          <a href="#" class="forgot-link">Lupa password?</a>
        </div>
        <button class="btn-primary" onclick="doLogin()">LOG IN</button>
        <div class="divider"><span>atau</span></div>
        <p class="switch-link">Belum punya akun? <a href="register.html">Daftar sekarang</a></p>
      </div>
    </div>
    <p class="footer-text">© 2026 UMKMify. All rights reserved.</p>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
