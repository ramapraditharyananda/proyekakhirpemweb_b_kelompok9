<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - UMKMify</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <div class="page-wrapper">
    <div class="card">

      <div class="card-header">
        <div class="logo-area">
          <img src="images/UMKMify_Logo_Color.png" alt="UMKMify" class="logo-img"/>
        </div>
        <p class="site-tagline">Platform Digital untuk UMKM Indonesia</p>
      </div>

      <div class="card-body">
        <h2 class="form-title">Selamat Datang</h2>
        <p class="form-subtitle">Masuk ke akun Anda untuk melanjutkan</p>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="contoh@email.com"/>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Masukkan password"/>
        </div>

        <div class="remember-row">
          <label class="remember-label">
            <input type="checkbox"/> Ingat saya
          </label>
          <a href="#" class="forgot-link">Lupa password?</a>
        </div>

        <button class="btn-primary">LOG IN</button>

        <div class="divider"><span>atau</span></div>

        <p class="switch-link">
          Belum punya akun? <a href="register.html">Daftar sekarang</a>
        </p>
      </div>

    </div>
    <p class="footer-text">© 2025 UMKMify. All rights reserved.</p>
  </div>

</body>
</html>
