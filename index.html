<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UMKMify - Platform Digital UMKM Lampung</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="index-hero">
    <div class="index-content">
      <div class="index-logo">
        <img src="images/UMKMify_Logo_Color.png" alt="Logo">
      </div>
      <p class="index-tagline">Platform Digital UMKM dan Produk Lokal Lampung.<br>Pilih peran Anda untuk melanjutkan.</p>
      <div class="index-cards">
        <a href="login.html?role=pengunjung" class="index-card">
          <span class="index-card-icon">🛍️</span>
          <span class="index-card-title">Pengunjung</span>
          <span class="index-card-sub">Lihat & beli produk UMKM</span>
        </a>
        <a href="login.html?role=pemilik" class="index-card">
          <span class="index-card-icon">🏪</span>
          <span class="index-card-title">Pemilik UMKM</span>
          <span class="index-card-sub">Kelola toko & produk Anda</span>
        </a>
        <a href="login.html?role=admin" class="index-card">
          <span class="index-card-icon">⚙️</span>
          <span class="index-card-title">Admin</span>
          <span class="index-card-sub">Kelola seluruh platform</span>
        </a>
      </div>
      <p class="index-login-link">Belum punya akun? <a href="register.html">Daftar sekarang</a></p>
    </div>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
